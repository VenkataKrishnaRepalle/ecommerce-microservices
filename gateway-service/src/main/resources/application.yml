server:
  port: 1001

spring:
  application:
    name: gateway-service
  cloud:
    config:
      import-check:
        enabled: false
    gateway:
      # Disable the automatic discovery locator to prefer explicit routes
      discovery:
        locator:
          enabled: false
      routes:
        # Explicit route for customer-service
        - id: customer-service
          uri: lb://customer-service # "lb" means load-balance via Eureka
          predicates:
            - Path=/customer-service/**
          filters:
            # This is the crucial part: it removes "/customer-service" from the path
            # before forwarding the request to the actual service.
            - StripPrefix=1

        # Explicit route for auth-service
        - id: auth-service
          uri: lb://auth-service # "lb" means load-balance via Eureka
          predicates:
            - Path=/auth-service/**
          filters:
            # This is the crucial part: it removes "/auth-service" from the path
            # before forwarding the request to the actual service.
            - StripPrefix=1

        - id: mail-service
          uri: lb://mail-service # "lb" means load-balance via Eureka
          predicates:
            - Path=/mail-service/**
          filters:
            # This is the crucial part: it removes "/auth-service" from the path
            # before forwarding the request to the actual service.
            - StripPrefix=1

        # Add explicit routes for your other services here in the same pattern
        # - id: product-service
        #   uri: lb://product-service
        #   predicates:
        #     - Path=/product-service/**
        #   filters:
        #     - StripPrefix=1

eureka:
  client:
    service-url:
      defaultZone: http://localhost:1000/eureka/
  instance:
    prefer-ip-address: true

# This is the standard way to configure grouped Swagger docs with explicit routes.
springdoc:
  swagger-ui:
    persistAuthorization: true
    # Define the name and URL for each service's documentation.
    # The URL is the path through the gateway.
    urls:
      - name: Customer Service
        url: /customer-service/v3/api-docs
      - name: Auth Service
        url: /auth-service/v3/api-docs
      - name: Mail Service
        url: /mail-service/v3/api-docs
      # - name: Product Service
      #   url: /product-service/v3/api-docs
