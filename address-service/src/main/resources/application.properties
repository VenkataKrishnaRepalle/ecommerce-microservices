spring.application.name=spring6-order
server.port=1001

spring.datasource.username=ema_user
spring.datasource.password=ema_password
spring.datasource.url=jdbc:postgresql://localhost:5432/ema_db?characterEncoding=UTF-8&serverTimezone=UTC
spring.jpa.database=postgresql
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=update
#Show SQL
spring.jpa.properties.hibernate.show_sql=true
# Format SQL
spring.jpa.properties.hibernate.format_sql=true
# Show bind values
logging.level.org.hibernate.orm.jdbc.bind=trace
#hikari pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
#spring.datasource.ssl=true
spring.datasource.hikari.pool-name=RestDB-Pool
spring.datasource.hikari.data-source-properties.cachePrepStmts=true
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048
spring.datasource.hikari.data-source-properties.useServerPrepStmts=true
spring.datasource.hikari.data-source-properties.useLocalSessionState=true
spring.datasource.hikari.data-source-properties.rewriteBatchedStatements=true
spring.datasource.hikari.data-source-properties.cacheResultSetMetadata=true
spring.datasource.hikari.data-source-properties.cacheServerConfiguration=true
spring.datasource.hikari.data-source-properties.elideSetAutoCommits=true
spring.datasource.hikari.data-source-properties.maintainTimeStatus=false

#spring.profiles.active=h2
#logging.level.com.pm.spring.ema=debug
springdoc.show-actuator=true
springdoc.api-docs.enabled=true

#file upload
## MULTIPART (MultipartProperties)
# Enable multipart uploads
spring.servlet.multipart.enabled=true
# Threshold after which files are written to disk.
spring.servlet.multipart.file-size-threshold=2KB
# Max file size.
spring.servlet.multipart.max-file-size=200MB
# Max Request Size
spring.servlet.multipart.max-request-size=215MB
## File Storage Properties
# All files uploaded through the REST API will be stored in this directory
file.upload_directory=spring6-order/order-logos/

#Devtools
spring.devtools.restart.enabled=false

# Logger
#logging.file.path=C:/Users/praja/IdeaProjects/spring6/spring6-order
#logging.file.name=spring6-order-log.log
#logging.level.root=DEBUG

# Hibernate envers
spring.jpa.properties.org.hibernate.envers.audit_table_suffix=_AUDIT
spring.jpa.properties.org.hibernate.envers.revision_field_name=revision
spring.jpa.properties.org.hibernate.envers.revision_type_field_name=revision_type
spring.jpa.properties.org.hibernate.envers.store_data_at_delete=true
#spring.jpa.properties.hibernate.id.new_generator_mappings=false

# Spring Admin
spring.boot.admin.client.url=http://localhost:8080

# Time zone
spring.jackson.time-zone=UTC
rest.api.response.time-zone=Asia/Kolkata





