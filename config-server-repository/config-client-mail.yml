server:
  port: 1002
  servlet:
    context-path: /

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    operationsSorter: method
    path: /swagger-ui.html

spring:
  jpa:
    database: POSTGRESQL
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  datasource:
    url: jdbc:postgresql://localhost:5432/chat_db
    username: chat_user
    password: '{cipher}09110b6731cc38a64c216f45a28be0b5bbf99331bd19c4a02c0bfdd196679327'
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: RestDB-Pool
      maximum-pool-size: 5
      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true
        useLocalSessionState: true
        rewriteBatchedStatements: true
        cacheResultSetMetadata: true
        cacheServerConfiguration: true
        elideSetAutoCommits: true
        maintainTimeStatus: true
  mail:
    host: smtp.gmail.com
    username: '{cipher}7fdf48cefaa77144e239a67e9f13935bb83fd62bd111fcf7e1715d2bcbf03ea9f8f39a59dab23ba5a9e1deebe11315a2'
    password: '{cipher}457cf141a8de1df114c10ca21b0fea205c71496a85f898aef3c572a75fdb60a7835075d3bcbd7fa28b06ba09ac45f678'
    port: 587
    properties:
      mail:
        smtp:
